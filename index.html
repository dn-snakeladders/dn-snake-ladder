<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Snake & Ladder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="homeScreen">
    <img src="https://cdn-icons-png.flaticon.com/512/3097/3097133.png" class="logo">
    <h1>DN Snake & Ladder</h1>

    <button class="mainBtn" onclick="showPlayers()">
        Start Game
    </button>
</div>

<div id="playerScreen" class="hidden">

    <h2>Select Players</h2>

    <div class="playerBtns">
        <button onclick="startGame(1)">1 Player</button>
        <button onclick="startGame(2)">2 Players</button>
        <button onclick="startGame(3)">3 Players</button>
        <button onclick="startGame(4)">4 Players</button>
    </div>

</div>

<div id="gameScreen" class="hidden">

    <h2>DN Snake & Ladder</h2>

    <div id="board"></div>

    <div class="controls">
        <div id="dice">🎲</div>

        <button onclick="rollDice()">
            Roll Dice
        </button>

        <h3 id="status">
            Player 1 Turn
        </h3>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
